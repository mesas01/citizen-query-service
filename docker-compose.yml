version: '3.9'

services:
  postgres:
    image: postgres:14
    container_name: postgres-citizen
    network_mode: "host"
    environment:
      POSTGRES_DB: citizen_db
      POSTGRES_USER: citizen_user
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: